<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iris Predictor{% endblock %}</title>

    <!-- Google Fonts: Cormorant Garamond + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <!-- Removed: <base target="_blank"> — this was forcing ALL links (including internal) to open in new tabs -->
</head>
<body>

    <!-- Decorative Background Petals -->
    <svg class="leaf-decoration leaf-1" viewBox="0 0 100 100" fill="currentColor">
        <path d="M50 0 C20 30, 0 60, 50 100 C100 60, 80 30, 50 0Z"/>
    </svg>
    <svg class="leaf-decoration leaf-2" viewBox="0 0 100 100" fill="currentColor">
        <path d="M50 0 C20 30, 0 60, 50 100 C100 60, 80 30, 50 0Z"/>
    </svg>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">
                    <!-- Replaced the generic globe icon with a botanical flower icon -->
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M12 22q-.825 0-1.587-.212t-1.413-.638q-.9.35-1.825.3T5.4 20.85q-.7-.75-.887-1.688T4.6 17.3q-.65-.575-1.025-1.325T3.2 14.4q-.2-.9.025-1.762T4 11.15q-.35-.9-.3-1.825T4.3 7.55q.75-.7 1.688-.887T7.85 6.75q.575-.65 1.325-1.025T10.75 5.35q.9-.2 1.763.025t1.487.775q.9-.35 1.825-.3t1.775.6q.7.75.888 1.688t-.113 1.862q.65.575 1.025 1.325t.35 1.575q.2.9-.025 1.762t-.775 1.488q.35.9.3 1.825t-.6 1.775q-.75.7-1.688.888t-1.862-.113q-.575.65-1.325 1.025T12 22zm0-10q.825 0 1.413-.587T14 10q0-.825-.587-1.412T12 8q-.825 0-1.412.588T10 10q0 .825.588 1.413T12 12zm0 6q.425 0 .713-.288T13 17q0-.425-.288-.712T12 16q-.425 0-.712.288T11 17q0 .425.288.713T12 18z"/>
                    </svg>
                </div>
                <span class="logo-text">Iris Predictor</span>
            </a>
            <ul class="nav-links">
                <!-- "About" link removed as requested -->
                <li><a href="/" class="active">Predict</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <img src="{{ url_for('static', filename='images/profile.jpg') }}"
                     alt="Dikachi Sunday"
                     class="footer-avatar"
                     onerror="this.style.display='none'">
                <div class="footer-brand-text">
                    <span class="footer-brand-name">Dikachi Sunday</span>
                    <!-- Fixed: typo "create" → "Created" + added flower emoji as requested -->
                    <span class="footer-brand-tagline">🌸 Created for the lovers of flowers</span>
                </div>
            </div>

            <!-- Social links — left untouched as requested -->
            <div class="footer-social">
                <a href="https://www.facebook.com/share/18H6wLY1fW/" target="_blank" class="social-link" aria-label="Facebook">
                    <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </a>
                <a href="https://www.linkedin.com/in/dikachi-sunday-a4a380356" target="_blank" class="social-link" aria-label="LinkedIn">
                    <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
                <a href="https://x.com/Baron_dikachi" target="_blank" class="social-link" aria-label="Twitter">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
                <a href="https://github.com/Dikachi32" target="_blank" class="social-link" aria-label="GitHub">
                    <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </a>
            </div>

            <div class="footer-copyright">
                <p>Built with care by <a href="https://github.com/Dikachi32" target="_blank">Dikachi Sunday</a></p>
                <p style="margin-top: 4px;">&copy; Iris Predictor. All rights reserved.</p>
            </div>
        </div>
    </footer>

</body>
</html>
